<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Console E2E Probe — Status</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    h1 {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #f0f6fc;
    }

    .status {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .status p {
      font-size: 16px;
      color: #8b949e;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="status">
    <h1>OK</h1>
    <p>all systems operational</p>
  </div>
</body>
</html>
